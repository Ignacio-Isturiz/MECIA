name: mecia

services:
  backend:
    build:
      context: ../BACKEND
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-tu-clave-secreta-super-segura-en-produccion-cambiar-esto}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - NEWS_API_BASE_URL=${NEWS_API_BASE_URL:-https://newsapi.org/v2}
      - SMTP_SERVER=${SMTP_SERVER:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@mecia.com}
      - FRONTEND_URL=http://localhost:3000
      - DEBUG=true
    ports:
      - "8000:8000"
    volumes:
      - ../BACKEND:/app
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../FRONTEND
      dockerfile: Dockerfile
      target: deps
    ports:
      - "3000:5173"
    depends_on:
      - backend
    volumes:
      - ../FRONTEND:/app
      - /app/node_modules
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
